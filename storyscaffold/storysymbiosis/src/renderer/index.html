<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src * data:; font-src https://fonts.gstatic.com; connect-src *;">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  width: 100%;
}

/* ── Shell ── */
.shell {
  width: 100%;
  min-width: 260px;
  background:
    linear-gradient(160deg, rgba(15,0,30,0.97) 0%, rgba(5,10,25,0.97) 60%, rgba(0,15,20,0.97) 100%);
  border: 1px solid rgba(0,255,255,0.25);
  border-radius: 16px;
  overflow: visible;
  display: flex;
  flex-direction: column;
  position: relative;
  box-shadow: 0 0 18px rgba(0,255,255,0.08), 0 0 40px rgba(180,0,255,0.06), inset 0 0 30px rgba(0,0,0,0.4);
}
.shell::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  background-image:
    linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
  background-size: 20px 20px;
  pointer-events: none;
  z-index: 0;
}
.shell > * { position: relative; z-index: 1; }

/* ── Titlebar ── */
.titlebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 12px 8px;
  border-bottom: 1px solid rgba(0,255,255,0.1);
  -webkit-app-region: no-drag;
  cursor: grab;
  user-select: none;
}
.titlebar:active { cursor: grabbing; }

.wordmark {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #00ffe0;
  letter-spacing: 0.1em;
  text-shadow: 0 0 8px rgba(0,255,224,0.6);
}
.wordmark span { color: rgba(0,255,224,0.3); }

.tb-right { display: flex; align-items: center; gap: 6px; }

.capture-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #333;
  transition: background 0.2s, opacity 0.2s;
}
.capture-dot.active { background: #a41818; animation: pulse 0.7s ease-in-out infinite; }
.capture-dot.manual { background: #7F77DD !important; }

@keyframes pulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }

.wbtn {
  width: 13px; height: 13px; border-radius: 50%;
  border: none; cursor: pointer; font-size: 8px;
  display: flex; align-items: center; justify-content: center;
  color: transparent; transition: color 0.1s;
}
.wbtn:hover { color: rgba(0,0,0,0.7); }
.wbtn.min { background: #BA7517; }
.wbtn.cls { background: #D85A30; }

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  padding: 9px;
  justify-items: center;
  align-items: start;
}

/* ── Agent Card ── */
.card {
  background: color-mix(in srgb, var(--c) 6%, rgba(8,4,20,0.97));
  border: 1px solid color-mix(in srgb, var(--c) 30%, rgba(0,255,255,0.08));
  border-radius: 11px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  width: 100%;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  position: relative;
}
.card:hover {
  box-shadow: 0 0 10px color-mix(in srgb, var(--c) 25%, transparent);
}
.card.active {
  cursor: pointer;
  border-color: color-mix(in srgb, var(--c) 55%, transparent);
  box-shadow: 0 0 12px color-mix(in srgb, var(--c) 30%, transparent);
}
.card.active:hover {
  background: color-mix(in srgb, var(--c) 11%, rgba(8,4,20,0.97));
}

.card-top {
  display: flex;
  align-items: flex-start;
  gap: 7px;
}

.avatar {
  width: 58px; height: 58px;
  border-radius: 10px;
  border: 1.5px solid color-mix(in srgb, var(--c) 25%, transparent);
  background: color-mix(in srgb, var(--c) 12%, #1c1c1c);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: border-color 0.2s;
}

.avatar-img { 
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 8px;  
}
.card.active .avatar {
  border-color: color-mix(in srgb, var(--c) 55%, transparent);
}
.avatar-initial {
  font-family: 'DM Sans', sans-serif;
  font-size: 16px; font-weight: 700;
  color: var(--c);
}

/* Speech bubble */
.bubble-wrap {
  display: flex; align-items: center; flex: 1;
  animation: pop 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes pop { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }

.bubble-tail {
  width:0; height:0;
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
  border-right: 6px solid;
  border-right-color: color-mix(in srgb, var(--c) 18%, rgba(20,20,20,0.98));
  flex-shrink: 0;
}
.bubble {
  background: color-mix(in srgb, var(--c) 10%, rgba(20,20,20,0.98));
  border: 1px solid color-mix(in srgb, var(--c) 20%, transparent);
  border-radius: 8px;
  padding: 5px 8px;
  min-height: 28px;
  flex: 1;
  display: flex; align-items: center;
}
.bubble-text {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  color: color-mix(in srgb, var(--c) 65%, #888);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

/* Dots */
.dots { display:flex; gap:3px; align-items:center; }
.dot {
  width:4px; height:4px; border-radius:50%;
  background: color-mix(in srgb, var(--c) 55%, #555);
  animation: blink 1.2s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0.15}40%{opacity:1}}

/* Agent name/role */
.agent-meta { display:flex; flex-direction:column; gap:1px; padding-left:1px; }
.agent-name { font-size:11px; font-weight:600; color: color-mix(in srgb, var(--c) 75%, #d0cbc4); }
.agent-role {
  font-family:'DM Mono',monospace;
  font-size:8px; color: color-mix(in srgb, var(--c) 50%, #555);
  text-transform:uppercase; letter-spacing:0.06em;
}
.card.active .agent-role { color: color-mix(in srgb, var(--c) 70%, #555); }

/* Comment panel */
.comment-panel {
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.04);
  display: flex; flex-direction: column; gap: 7px;
  animation: slide 0.15s ease;
}
@keyframes slide{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}

.comment-text {
  font-size: 11px; line-height: 1.6; color: #9e9990; margin: 0;
}

.ref-btn, .dismiss-btn {
  background: none; border: none; cursor: pointer; padding: 0; text-align: left;
  font-family: 'DM Mono', monospace; font-size: 9px;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.ref-btn   { color: color-mix(in srgb, var(--c) 50%, #444); }
.ref-btn:hover { color: var(--c); }
.dismiss-btn { color: #444; }
.dismiss-btn:hover { color: #555; }

/* ── Feedback widget ── */
.feedback-section {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding-top: 2px;
  animation: slide 0.2s ease;
}
.feedback-label {
  font-family: 'DM Mono', monospace;
  font-size: 7px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #666; 
}
.feedback-buttons {
  display: flex;
  flex-direction: row;
  gap: 4px;
}
.fb-btn {
  flex: 1;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 6px;
  padding: 5px 2px;
  cursor: pointer;
  text-align: center;
  font-size: 14px;
  line-height: 1;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
}
.fb-btn:hover {
  background: color-mix(in srgb, var(--c) 8%, rgba(255,255,255,0.03));
  border-color: color-mix(in srgb, var(--c) 25%, transparent);
  transform: scale(1.12);
}
.fb-btn.selected {
  background: color-mix(in srgb, var(--c) 12%, rgba(16,16,16,0.97));
  border-color: color-mix(in srgb, var(--c) 40%, transparent);
  transform: scale(1.12);
}

/* Artifact */
.artifact {
  background: rgba(0,0,0,0.3);
  border-radius: 8px; overflow: hidden;
  animation: slide 0.15s ease;
}
.art-img  { width:100%; height:62px; object-fit:cover; display:block; }
.art-ph   { width:100%; height:42px; background:#181818; }
.art-meta { padding:6px 8px; display:flex; flex-direction:column; gap:2px; }
.art-title { font-size:10px; font-weight:600; color:#bbb; }
.art-sub   { font-family:'DM Mono',monospace; font-size:8px; color:#444; }
.art-cap   { font-size:9px; color:#666; line-height:1.4; margin:1px 0 0; }

.art-loading { display:flex; align-items:center; justify-content:center; gap:4px; padding:10px; }
.art-loading .dot { background: #333; }

/* ── Footer ── */
.footer {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px 10px;
  border-top: 1px solid rgba(0,255,255,0.08);
}
.foot-label {
  font-family:'DM Mono',monospace;
  font-size:8px; text-transform:uppercase; letter-spacing:0.08em;
  color:#666; white-space:nowrap;
}
.slider { flex:1; accent-color:#FF2D78; cursor:pointer; }
.capture-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px; color:#888;
  font-size:14px; width:24px; height:24px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; transition: color 0.15s;
}
.capture-btn:hover { color:#ccc; }
.capture-btn.spinning { animation: spin 0.7s linear infinite; color:#7F77DD; }
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Export menu ── */
.export-menu {
  position: absolute;
  bottom: 44px; right: 12px;
  background: rgba(18,18,18,0.98);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  overflow: hidden;
  min-width: 180px;
  animation: slide 0.12s ease;
  z-index: 100;
}
.export-item {
  display: flex; flex-direction: column; gap: 1px;
  padding: 8px 11px;
  background: none; border: none; width: 100%;
  text-align: left; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.1s;
}
.export-item:last-child { border-bottom: none; }
.export-item:hover { background: rgba(255,255,255,0.04); }
.export-item-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 500; color: #888;
}
.export-item-desc {
  font-family: 'DM Mono', monospace;
  font-size: 8px; color: #333;
  text-transform: uppercase; letter-spacing: 0.05em;
}

.avatar-img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 8px;
}

.hidden { display: none !important; }

/* ── Full panel overlay ── */
.full-panel {
  position: absolute;
  inset: 0;
  z-index: 150;
  background: linear-gradient(160deg, rgba(12,0,25,0.99) 0%, rgba(4,8,20,0.99) 60%, rgba(0,12,18,0.99) 100%);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 18px 16px 16px;
  gap: 14px;
  transform-origin: center center;
}
.full-panel.entering { animation: fpIn 0.28s cubic-bezier(0.34,1.4,0.64,1) forwards; }
.full-panel.leaving  { animation: fpOut 0.18s ease forwards; }
@keyframes fpIn  { from{transform:scale(0.35);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes fpOut { from{transform:scale(1);opacity:1}   to{transform:scale(0.35);opacity:0} }

/* ── Artifact side panel ── */
.artifact-panel {
  border-radius: 10px;
  border: 1px solid color-mix(in srgb, var(--fp-c) 35%, rgba(0,255,255,0.08));
  background: color-mix(in srgb, var(--fp-c) 6%, rgba(6,2,14,0.98));
  box-shadow: 0 0 14px color-mix(in srgb, var(--fp-c) 12%, transparent);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.artifact-panel.ap-in  { animation: apSlideIn 0.3s cubic-bezier(0.34,1.3,0.64,1) forwards; }
.artifact-panel.ap-out { animation: apSlideOut 0.18s ease forwards; }
@keyframes apSlideIn  { from{transform:translateY(-12px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes apSlideOut { from{transform:translateY(0);opacity:1}     to{transform:translateY(-8px);opacity:0} }

.ap-header {
  padding: 8px 10px;
  border-bottom: 1px solid color-mix(in srgb, var(--fp-c) 18%, rgba(255,255,255,0.04));
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.ap-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 7px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: color-mix(in srgb, var(--fp-c) 50%, #444);
}
.ap-close {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  color: #444;
  line-height: 1;
  padding: 0 2px;
  transition: color 0.15s;
}
.ap-close:hover { color: #aaa; }
.fp-close {
  background: none; border: none; cursor: pointer;
  font-size: 16px; color: #555; line-height: 1; padding: 0 2px;
  transition: color 0.15s; flex-shrink: 0;
}
.fp-close:hover { color: #ccc; }
.ap-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
.ap-title {
  font-size: 13px; font-weight: 600;
  color: color-mix(in srgb, var(--fp-c) 70%, #d0cbc4);
  line-height: 1.35;
}
.ap-meta {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: color-mix(in srgb, var(--fp-c) 45%, #555);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.ap-caption {
  font-size: 11px;
  line-height: 1.6;
  color: #999;
}
.ap-footer { padding: 8px 12px 10px; }
.ap-link {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: color-mix(in srgb, var(--fp-c) 55%, #444);
  text-decoration: none;
  border: 1px solid color-mix(in srgb, var(--fp-c) 22%, transparent);
  border-radius: 5px;
  padding: 4px 8px;
  cursor: pointer;
  background: none;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  width: 100%;
  text-align: center;
}
.ap-link:hover {
  color: color-mix(in srgb, var(--fp-c) 85%, #ccc);
  border-color: color-mix(in srgb, var(--fp-c) 45%, transparent);
  background: color-mix(in srgb, var(--fp-c) 8%, transparent);
}
.ap-link.hidden { display: none !important; }
.ap-loading {
  display: flex; align-items: center; justify-content: center;
  gap: 4px; padding: 24px 0; flex: 1;
}
.ap-loading .dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: color-mix(in srgb, var(--fp-c) 40%, #333);
  animation: blink 1.2s ease-in-out infinite;
}
.ap-loading .dot:nth-child(2){animation-delay:.2s}
.ap-loading .dot:nth-child(3){animation-delay:.4s}

.fp-header {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.1);
}
.fp-avatar {
  width: 42px; height: 42px; border-radius: 10px;
  overflow: hidden; border: 1.5px solid; flex-shrink: 0;
}
.fp-avatar img { width: 100%; height: 100%; object-fit: cover; }
.fp-name { font-size: 14px; font-weight: 600; }
.fp-role {
  font-family: 'DM Mono', monospace; font-size: 8px;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.fp-body {
  flex: 1; min-height: 0; overflow-y: auto;
  display: flex; flex-direction: column; gap: 12px;
}
.fp-body::-webkit-scrollbar { width: 3px; }
.fp-body::-webkit-scrollbar-track { background: transparent; }
.fp-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.fp-comment {
  font-size: 13px; line-height: 1.8; color: #d4cedf;
}
.fp-feedback-label {
  font-family: 'DM Mono', monospace; font-size: 7px;
  text-transform: uppercase; letter-spacing: 0.08em; color: #555;
  margin-bottom: 7px;
}
.fp-buttons { display: flex; flex-direction: row; gap: 8px; }
.fp-btn {
  flex: 1;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; padding: 10px 4px;
  cursor: pointer; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
}
.fp-btn-face { font-size: 20px; line-height: 1; }
.fp-btn-label {
  font-family: 'DM Mono', monospace; font-size: 7px;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: #555; line-height: 1.2;
}
.fp-btn:hover {
  background: color-mix(in srgb, var(--fp-c) 10%, rgba(255,255,255,0.03));
  border-color: color-mix(in srgb, var(--fp-c) 35%, transparent);
  transform: scale(1.06);
}
.fp-btn:hover .fp-btn-label { color: color-mix(in srgb, var(--fp-c) 70%, #999); }
.fp-btn.selected {
  background: color-mix(in srgb, var(--fp-c) 14%, rgba(16,16,16,0.97));
  border-color: color-mix(in srgb, var(--fp-c) 50%, transparent);
  transform: scale(1.06);
}
.fp-btn.selected .fp-btn-label { color: color-mix(in srgb, var(--fp-c) 80%, #ccc); }

.fp-noticed {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: color-mix(in srgb, var(--fp-c) 45%, #555);
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.slider-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.slider-labels {
  display: flex; justify-content: space-between;
  font-family: 'DM Mono', monospace;
  font-size: 7px; color: #3a3a3a; letter-spacing: 0.04em;
  padding: 0 2px;
}
</style>
</head>
<body>

<div class="shell">

  <!-- Titlebar -->
  <div class="titlebar" id="titlebar">
    <div class="wordmark"><span>◈ </span>your audience</div>
    <div class="tb-right">
      <div class="capture-dot" id="cap-dot"></div>
      <button class="wbtn min" onclick="api.minimize()">—</button>
      <button class="wbtn cls" onclick="api.close()">×</button>
    </div>
  </div>

  <!-- 2×2 agent grid (built by JS) -->
  <div class="grid" id="grid"></div>

  <!-- Full panel overlay -->
  <div id="full-panel" class="full-panel hidden"></div>

  <!-- Export dropdown menu (shown above footer) -->
  <div id="export-menu" class="export-menu hidden">
    <button class="export-item" onclick="doExport('events')">
      <span class="export-item-label">Interaction events</span>
      <span class="export-item-desc">CSV · clicks, feedback, dismissals</span>
    </button>
    <button class="export-item" onclick="doExport('states')">
      <span class="export-item-label">State snapshots</span>
      <span class="export-item-desc">CSV · screen descriptions over time</span>
    </button>
    <button class="export-item" onclick="doExport('json')">
      <span class="export-item-label">Full audit trail</span>
      <span class="export-item-desc">JSON · complete session log</span>
    </button>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="foot-label">Voice</span>
    <div class="slider-wrap">
      <input type="range" class="slider" min="0" max="1" step="0.05" value="0.5" id="slider"/>
      <div class="slider-labels"><span>quiet</span><span>balanced</span><span>open</span></div>
    </div>
    <button class="capture-btn" id="export-btn" title="Export session data" onclick="toggleExportMenu()">⤓</button>
    <button class="capture-btn" id="cap-btn" title="Capture now (⌘⇧S)" onclick="manualCapture()">↺</button>
  </div>

</div>

<script>
// ── Agent definitions ─────────────────────────────────────────────────────────
const AGENTS = [
  { id: 'recombinability', name: 'Remi', role: 'Recombinability', color: '#7F77DD', avatar: 'img/avatar0.png' },
  { id: 'contrarian',      name: 'Cass', role: 'Contrarian',      color: '#D85A30', avatar: 'img/avatar1.png' },
  { id: 'discoverability', name: 'Dex',  role: 'Discoverability', color: '#1D9E75', avatar: 'img/avatar2.png' },
  { id: 'reviewability',   name: 'Rex',  role: 'Reviewability',   color: '#BA7517', avatar: 'img/avatar3.png' },
]

// Feedback button definitions
const FEEDBACK_OPTIONS = [
  { key: 'explore',   icon: '😊', label: 'Exploring' },
  { key: 'different', icon: '😐', label: 'Different' },
  { key: 'unsure',    icon: '😔', label: 'Not sure' },
]

// ── State ─────────────────────────────────────────────────────────────────────
function resetAgentState() {
  return { hasMessage: false, comment: null, noticed: null, artifact: null,
           loadingComment: false, loadingArtifact: false,
           expanded: false, artifactOpen: false, feedbackKey: null }
}

const state = {}
AGENTS.forEach(a => { state[a.id] = resetAgentState() })

// ── Build DOM ─────────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid')
  AGENTS.forEach(agent => {
    const card = document.createElement('div')
    card.className = 'card'
    card.id = `card-${agent.id}`
    card.style.setProperty('--c', agent.color)
    card.onclick = () => onCardClick(agent.id)

    card.innerHTML = `
      <div class="card-top" id="top-${agent.id}">
        <div class="avatar">
          <img class="avatar-img" src="${agent.avatar}" alt="${agent.name}" />
        </div>
        <div id="bubble-${agent.id}" class="hidden"></div>
      </div>
      <div class="agent-meta">
        <span class="agent-name">${agent.name}</span>
        <span class="agent-role">${agent.role}</span>
      </div>
      <div id="panel-${agent.id}" class="hidden"></div>
    `
    grid.appendChild(card)
  })
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(id) {
  const s = state[id]
  const agent = AGENTS.find(a => a.id === id)
  const card = document.getElementById(`card-${id}`)
  const bubbleEl = document.getElementById(`bubble-${id}`)
  const panelEl = document.getElementById(`panel-${id}`)

  // Card active state
  card.classList.toggle('active', s.hasMessage || !!s.comment)

  // Speech bubble
  if (s.hasMessage || s.comment || s.loadingComment) {
    bubbleEl.className = 'bubble-wrap'
    bubbleEl.innerHTML = `<div class="bubble-tail"></div><div class="bubble"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`
  } else {
    bubbleEl.className = 'hidden'
    bubbleEl.innerHTML = ''
  }

  panelEl.className = 'hidden'
  panelEl.innerHTML = ''
}

function buildFeedbackHTML(id, s) {
  const buttons = FEEDBACK_OPTIONS.map(opt => {
    const isSelected = s.feedbackKey === opt.key
    return `
      <button
        class="fb-btn${isSelected ? ' selected' : ''}"
        onclick="submitFeedback(event, '${id}', '${opt.key}')"
        title="${opt.label}"
      >${opt.icon}</button>
    `
  }).join('')

  return `
    <div class="feedback-section">
      <span class="feedback-label">Your take</span>
      <div class="feedback-buttons">${buttons}</div>
    </div>
  `
}

function renderAll() { AGENTS.forEach(a => render(a.id)) }

// ── Full panel ────────────────────────────────────────────────────────────────
let _fullPanelId = null

function _renderArtifactPanel(artifact) {
  const ap = document.getElementById('artifact-panel')
  if (!ap) return

  if (!artifact) {
    // Still loading — show spinner
    ap.querySelector('.ap-body').innerHTML = `
      <div class="ap-loading">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    `
    ap.querySelector('.ap-footer').innerHTML = ''
    return
  }

  ap.querySelector('.ap-body').innerHTML = `
    <div class="ap-title">${artifact.title || 'Reference'}</div>
    ${artifact.creator || artifact.year
      ? `<div class="ap-meta">${[artifact.creator, artifact.year].filter(Boolean).join(' · ')}</div>`
      : ''}
    <p class="ap-caption">${artifact.caption || ''}</p>
  `

  const footer = ap.querySelector('.ap-footer')
  if (artifact.link) {
    footer.innerHTML = `
      <button class="ap-link" onclick="api.openLink('${artifact.link.replace(/'/g, "\\'")}')">
        open reference ↗
      </button>
    `
  } else {
    footer.innerHTML = ''
  }
}

function showFullPanel(id) {
  const agent = AGENTS.find(a => a.id === id)
  const s = state[id]
  _fullPanelId = id

  const panel = document.getElementById('full-panel')
  panel.style.setProperty('--fp-c', agent.color)
  panel.innerHTML = `
    <div class="fp-header">
      <div class="fp-avatar" style="border-color:color-mix(in srgb,${agent.color} 50%,transparent)">
        <img src="${agent.avatar}" alt="${agent.name}"/>
      </div>
      <div style="flex:1">
        <div class="fp-name" style="color:color-mix(in srgb,${agent.color} 75%,#d0cbc4)">${agent.name}</div>
        <div class="fp-role" style="color:color-mix(in srgb,${agent.color} 50%,#555)">${agent.role}</div>
      </div>
      <button class="fp-close" onclick="closeFullPanel()">×</button>
    </div>

    <div class="fp-body">
      ${s.noticed ? `<div class="fp-noticed">Noticed: ${s.noticed}</div>` : ''}
      <p class="fp-comment">${s.comment}</p>

      <div id="artifact-panel" class="artifact-panel" style="--fp-c:${agent.color}">
        <div class="ap-header">
          <div class="ap-eyebrow">◈ reference artifact</div>
        </div>
        <div class="ap-body">
          <div class="ap-loading">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          </div>
        </div>
        <div class="ap-footer"></div>
      </div>
    </div>

    <div style="flex-shrink:0">
      <div class="fp-feedback-label">Your take</div>
      <div class="fp-buttons">
        ${FEEDBACK_OPTIONS.map(opt => `
          <button class="fp-btn${s.feedbackKey === opt.key ? ' selected' : ''}"
            onclick="fpFeedback('${id}','${opt.key}')">
            <span class="fp-btn-face">${opt.icon}</span>
            <span class="fp-btn-label">${opt.label}</span>
          </button>`).join('')}
      </div>
    </div>
  `

  panel.classList.remove('hidden', 'leaving')
  panel.classList.add('entering')
  panel.addEventListener('animationend', () => {
    panel.classList.remove('entering')
    // Slide the artifact panel in after the main panel has appeared
    const ap = document.getElementById('artifact-panel')
    if (ap) {
      ap.classList.add('ap-in')
      ap.addEventListener('animationend', () => ap.classList.remove('ap-in'), { once: true })
    }
  }, { once: true })

  // Fetch artifact lazily — render it into the side panel when ready
  _fetchArtifactForPanel(id)
}

async function _fetchArtifactForPanel(id) {
  if (state[id].artifact) {
    _renderArtifactPanel(state[id].artifact)
    return
  }
  if (state[id].loadingArtifact) return
  state[id].loadingArtifact = true
  try {
    const data = await api.fetchArtifact(id)
    state[id].artifact = data.artifact || null
    state[id].loadingArtifact = false
    // Only update if this panel is still open for the same agent
    if (_fullPanelId === id) {
      _renderArtifactPanel(state[id].artifact)
    }
  } catch (_) {
    state[id].loadingArtifact = false
  }
}

function dismissArtifactPanel() {
  const ap = document.getElementById('artifact-panel')
  if (!ap) return
  ap.classList.add('ap-out')
  ap.addEventListener('animationend', () => ap.remove(), { once: true })
}

async function fpFeedback(id, key) {
  state[id].feedbackKey = key
  const preview = state[id].comment ? state[id].comment.slice(0, 80) : ''

  const _finish = async () => { await api.submitFeedback(id, key, preview); closeFullPanel() }

  const ap = document.getElementById('artifact-panel')
  if (ap) {
    ap.classList.remove('ap-in')
    ap.classList.add('ap-out')
    ap.addEventListener('animationend', _finish, { once: true })
  } else {
    await _finish()
  }
}

function closeFullPanel() {
  const panel = document.getElementById('full-panel')
  const id = _fullPanelId
  panel.classList.remove('entering')
  panel.classList.add('leaving')
  panel.addEventListener('animationend', () => {
    panel.classList.add('hidden')
    panel.classList.remove('leaving')
    if (id) { state[id] = resetAgentState(); render(id) }
    _fullPanelId = null
  }, { once: true })
}

// ── Interactions ──────────────────────────────────────────────────────────────
async function onCardClick(id) {
  const s = state[id]
  if (!s.hasMessage && !s.comment) return
  if (s.loadingComment) return
  if (!s.comment) {
    state[id].loadingComment = true
    render(id)
    const data = await api.fetchComment(id)
    state[id].loadingComment = false
    state[id].comment = data.comment
    state[id].noticed = data.noticed || null
    render(id)
  }
  showFullPanel(id)
}



async function dismiss(id) {
  await api.dismissComment(id)
  state[id] = resetAgentState()
  render(id)
}

// ── Capture ───────────────────────────────────────────────────────────────────
function manualCapture() {
  api.manualCapture()
}

// ── Export ────────────────────────────────────────────────────────────────────
function toggleExportMenu() {
  const menu = document.getElementById('export-menu')
  menu.classList.toggle('hidden')
}

async function doExport(format) {
  document.getElementById('export-menu').classList.add('hidden')
  const btn = document.getElementById('export-btn')
  btn.style.color = '#7F77DD'
  btn.style.pointerEvents = 'none'
  try {
    await api.exportSession(format)
  } finally {
    btn.style.color = ''
    btn.style.pointerEvents = ''
  }
}

// Close export menu if user clicks outside it
window.addEventListener('click', e => {
  const menu = document.getElementById('export-menu')
  const btn  = document.getElementById('export-btn')
  if (!menu.classList.contains('hidden') && !menu.contains(e.target) && e.target !== btn) {
    menu.classList.add('hidden')
  }
})

// ── Slider ────────────────────────────────────────────────────────────────────
document.getElementById('slider').addEventListener('change', e => {
  api.updateSlider(parseFloat(e.target.value))
})

// ── IPC events ────────────────────────────────────────────────────────────────
api.on('capture-start', ({ manual }) => {
  const dot = document.getElementById('cap-dot')
  const btn = document.getElementById('cap-btn')
  dot.classList.add('active')
  if (manual) dot.classList.add('manual')
  btn.classList.add('spinning')
})

api.on('capture-done', () => {
  const dot = document.getElementById('cap-dot')
  dot.classList.remove('active', 'manual')
  document.getElementById('cap-btn').classList.remove('spinning')
})

api.on('cycle-complete', ({ hand_raisers, manual }) => {
  const dot = document.getElementById('cap-dot')
  dot.classList.remove('active', 'manual')
  document.getElementById('cap-btn').classList.remove('spinning')

  const raisers = new Set(hand_raisers)
  AGENTS.forEach(a => {
    state[a.id].hasMessage = raisers.has(a.id) || !!state[a.id].comment
  })
  renderAll()

  // Pre-fetch artifacts so they're ready before user clicks
  hand_raisers.forEach(id => _fetchArtifactForPanel(id))
})

// ── Drag (frameless window) ───────────────────────────────────────────────────
let dragOrigin = null
document.getElementById('titlebar').addEventListener('mousedown', e => {
  dragOrigin = { x: e.screenX, y: e.screenY }
})
window.addEventListener('mousemove', e => {
  if (!dragOrigin) return
  api.drag({ dx: e.screenX - dragOrigin.x, dy: e.screenY - dragOrigin.y })
  dragOrigin = { x: e.screenX, y: e.screenY }
})
window.addEventListener('mouseup', () => { dragOrigin = null })

// ── Init ──────────────────────────────────────────────────────────────────────
buildGrid()

document.fonts.ready.then(() => api.resize(document.querySelector('.shell').offsetHeight))
